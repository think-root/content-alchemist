services:
  content-alchemist:
    container_name: content-alchemist
    image: content-alchemist:latest
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION}
    env_file:
      - .env
    environment:
      - SQLITE_DB_PATH=data/content-alchemist.db
    ports:
      - "${API_PORT:-9111}:${SERVER_PORT:-9111}"
    volumes:
      - ~/sqlite_db:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:$${SERVER_PORT:-9111}/healthz\" >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - think-root-network

networks:
  think-root-network:
    external: true
